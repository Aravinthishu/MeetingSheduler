<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#388add;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4a80;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  <!-- Calendar icon -->
  <rect x="20" y="28" width="60" height="52" rx="6" fill="white" opacity="0.95"/>
  <!-- Calendar header -->
  <rect x="20" y="28" width="60" height="16" rx="6" fill="rgba(56,138,221,0.2)"/>
  <!-- Calendar dots -->
  <circle cx="35" cy="36" r="2" fill="#388add"/>
  <circle cx="50" cy="36" r="2" fill="#388add"/>
  <circle cx="65" cy="36" r="2" fill="#388add"/>
  <!-- Calendar lines -->
  <line x1="30" y1="52" x2="70" y2="52" stroke="#388add" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="30" y1="60" x2="60" y2="60" stroke="#388add" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="30" y1="68" x2="65" y2="68" stroke="#388add" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Checkmark on calendar -->
  <path d="M42 64 L50 72 L62 56" stroke="#388add" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- "M" letter -->
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">M</text>
</svg>